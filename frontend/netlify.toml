##############################################################
#  netlify.toml — Deploy GullyCricket FRONTEND to Netlify
#  Drop the /frontend folder onto netlify.com
##############################################################

[build]
  publish = "."          # deploy everything in /frontend

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA redirect — all 404s serve index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
